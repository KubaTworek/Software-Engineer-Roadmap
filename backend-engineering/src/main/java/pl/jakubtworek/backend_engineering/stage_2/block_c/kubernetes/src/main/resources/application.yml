server:
  port: ${PORT:8080}
  shutdown: graceful

spring:
  application:
    name: demo-api
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:25s}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  name: ${APP_NAME:demo-api}
  port: ${PORT:8080}
  startup-delay: ${STARTUP_DELAY:5s}
  shutdown-timeout: ${SHUTDOWN_TIMEOUT:25s}
  config-file-path: ${APP_CONFIG_FILE:/etc/app/app.yaml}
  tmp-directory: ${TMP_DIRECTORY:/tmp/demo-api}