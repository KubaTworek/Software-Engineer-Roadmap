apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-api-rps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-api

  minReplicas: 2
  maxReplicas: 20

  metrics:
    - type: Pods
      pods:
        metric:
          # This metric requires a custom metrics adapter.
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "20"