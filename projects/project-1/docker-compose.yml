services:
  postgres:
    image: postgres:16-alpine
    container_name: booking-capacity-postgres
    environment:
      POSTGRES_DB: booking_capacity
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking_capacity"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: booking-capacity-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: booking-capacity-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: booking_capacity_read_model
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
