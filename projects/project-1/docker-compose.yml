services:
  postgres:
    image: postgres:16-alpine
    container_name: booking-capacity-postgres
    environment:
      POSTGRES_DB: booking_capacity
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking_capacity"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
