spring:
  application:
    name: booking-capacity-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/booking_capacity
    username: booking
    password: booking
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 50
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: INFO
