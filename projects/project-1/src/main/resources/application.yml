spring:
  application:
    name: booking-capacity-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/booking_capacity
    username: booking
    password: booking
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 50
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379
    mongodb:
      uri: mongodb://localhost:27017/booking_capacity_read_model

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: INFO

security:
  jwt:
    secret: dev-only-stage-7-secret-key-change-me-minimum-32-characters
    access-token-seconds: 900
    refresh-token-seconds: 604800
