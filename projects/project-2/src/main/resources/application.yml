spring:
  application:
    name: marketplace-modular-monolith
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/marketplace}
    username: ${DATABASE_USERNAME:marketplace}
    password: ${DATABASE_PASSWORD:marketplace}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

marketplace:
  events:
    mode: ${EVENTS_MODE:in-memory}
  payment-gateway:
    mode: ${PAYMENT_GATEWAY_MODE:fake-success}
